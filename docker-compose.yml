version: '3.8'

services:
  nhentai-bot:
    build: .
    container_name: nhentai-bot
    restart: unless-stopped
    
    # ✨ 核心魔法：让容器以 serveradmin 的身份运行，不再是 root！
    # 这里的 1000:1000 请替换成你刚才 id 命令查到的 uid 和 gid
    user: "1000:1000"

    environment:
      - TZ=Australia/Sydney
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - NHENTAI_API_KEY=${NHENTAI_API_KEY}

    volumes:
      - /home/serveradmin/Disks/NC/NC_Files/nextcloud_data/Epub/files/本子/nhentai:/app/local_downloads